<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conference Site Visits</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f9fafb; --border: #e5e7eb;
    --text: #111827; --text2: #6b7280;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111827; --bg2: #1f2937; --border: #374151; --text: #f9fafb; --text2: #9ca3af; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 12px 16px; max-width: 720px; margin: 0 auto; min-height: 100vh; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px 8px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg2); color: var(--text); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .tab.active-scottsdale { background: #c2410c; border-color: #c2410c; color: #fff; }
  .tab.active-sanjose { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
  .progress-box { background: var(--bg2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }
  .progress-box.scottsdale { border: 1px solid #fed7aa; }
  .progress-box.sanjose { border: 1px solid #bfdbfe; }
  .progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .progress-label { font-weight: 600; }
  .progress-label.scottsdale { color: #c2410c; }
  .progress-label.sanjose { color: #1d4ed8; }
  .progress-count { color: var(--text2); }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .progress-fill.scottsdale { background: #c2410c; }
  .progress-fill.sanjose { background: #1d4ed8; }
  .filter-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; }
  .filter-btn.active-scottsdale { background: #c2410c; color: #fff; border-color: #c2410c; }
  .filter-btn.active-sanjose { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .section { margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
  .section.scottsdale { border: 1px solid #fed7aa; }
  .section.sanjose { border: 1px solid #bfdbfe; }
  .sec-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: none; cursor: pointer; text-align: left; }
  .sec-header.scottsdale { background: #fff7ed; }
  .sec-header.sanjose { background: #eff6ff; }
  .sec-header-left { display: flex; align-items: center; gap: 8px; }
  .sec-icon { font-size: 18px; }
  .sec-title { font-size: 14px; font-weight: 700; }
  .sec-title.scottsdale { color: #c2410c; }
  .sec-title.sanjose { color: #1d4ed8; }
  .sec-header-right { display: flex; align-items: center; gap: 8px; }
  .sec-count { font-size: 12px; color: var(--text2); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
  .sec-arrow { font-size: 16px; }
  .sec-arrow.scottsdale { color: #c2410c; }
  .sec-arrow.sanjose { color: #1d4ed8; }
  .sec-body { background: var(--bg2); }
  .subsec-header { padding: 8px 14px 4px; font-size: 13px; font-weight: 700; background: var(--bg); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .subsec-header.scottsdale { color: #c2410c; border-color: #fed7aa; }
  .subsec-header.sanjose { color: #1d4ed8; border-color: #bfdbfe; }
  .item { border-bottom: 1px solid var(--border); padding: 10px 14px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; }
  .checkbox { width: 22px; height: 22px; min-width: 22px; border-radius: 6px; border: 2px solid var(--border); background: transparent; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; flex-shrink: 0; }
  .checkbox.done-scottsdale { background: #c2410c; border-color: #c2410c; }
  .checkbox.done-sanjose { background: #1d4ed8; border-color: #1d4ed8; }
  .item-text { flex: 1; font-size: 14px; line-height: 1.4; }
  .item-text.done { color: var(--text2); text-decoration: line-through; }
  .note-preview { font-size: 12px; color: var(--text2); margin-top: 4px; font-style: italic; }
  .note-btn { font-size: 16px; background: transparent; border: none; cursor: pointer; color: var(--text2); padding: 0 2px; margin-top: 1px; flex-shrink: 0; }
  .note-btn.has-note-scottsdale { color: #c2410c; }
  .note-btn.has-note-sanjose { color: #1d4ed8; }
  textarea { margin-top: 8px; width: 100%; min-height: 80px; padding: 8px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; resize: vertical; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
  .hidden { display: none; }
  .spacer { height: 30px; }
  .export-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #059669; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  .export-btn:active { background: #047857; }
  .pdf-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #7c3aed; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
  .pdf-btn:active { background: #6d28d9; }
  #export-box { display:none; width:100%; min-height:200px; padding:10px; border-radius:8px; border:1px solid var(--border); font-size:12px; background:var(--bg2); color:var(--text); font-family:monospace; resize:vertical; box-sizing:border-box; margin-bottom:8px; }
  .copy-btn { width:100%; padding:10px; border-radius:10px; border:none; background: #2563eb; color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:16px; display:none; }
</style>
</head>
<body>

<h1>🏁 Conference Site Visits</h1>
<p class="subtitle">Tap items to check off · Add notes inline</p>

<div class="tabs">
  <button class="tab active-scottsdale" id="tab-scottsdale" onclick="switchCity('scottsdale')">🌵 Scottsdale, AZ</button>
  <button class="tab" id="tab-sanjose" onclick="switchCity('sanjose')">💻 San Jose, CA</button>
</div>

<div class="progress-box scottsdale" id="progress-box">
  <div class="progress-row">
    <span class="progress-label scottsdale" id="progress-label">Progress</span>
    <span class="progress-count" id="progress-count">0 / 0 items</span>
  </div>
  <div class="progress-bar"><div class="progress-fill scottsdale" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="filter-row">
  <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">Show all</button>
</div>

<div id="sections-container"></div>

<button class="export-btn" onclick="exportNotes()">📋 Export All Notes & Completed Items</button>
<button class="pdf-btn" onclick="exportPDF()">📄 Download PDF Summary</button>
<textarea id="export-box"></textarea>
<button class="copy-btn" id="copy-btn" onclick="copyExport()">📱 Copy to Clipboard</button>
<div class="spacer"></div>

<script>
const data = {
  scottsdale: {
    label: "🌵 Scottsdale, AZ", color: "#c2410c", key: "scottsdale",
    sections: [
      { id:"s1", icon:"🏨", title:"JW Marriott Desert Ridge — Event Spaces", items:[
        "Ballrooms — full walkthrough",
        "Breakout spaces — capacity, layout options",
        "Lawn space — size, surface, usability",
        "Foyer space & registration desks",
        "Ask: how is the foyer separated from the ballroom?",
        "Can a car be driven inside the meeting spaces? (Trackhouse car)",
        "Where could expo booths be set up?",
        "Where could an executive lounge be located?",
        "Full walkthrough of the guest journey to/from meeting spaces",
        "Where is the greenroom behind the stage?",
        "Where is the office space?",
      ]},
      { id:"s2", icon:"🛏️", title:"JW Marriott Desert Ridge — Sleeping Rooms", items:[
        "ROH (Run of House) rooms — view, standard, quality",
        "Suites — types available, locations, views",
        "Villas — layout, access, suitability for VIPs",
      ]},
      { id:"s3", icon:"🍽️", title:"JW Marriott Desert Ridge — Public Spaces & Amenities", items:[
        "Restaurants — options, private dining potential",
        "Spa — capacity, group bookings possible?",
        "Pool area — can it be used for events/networking?",
        "Pickleball & tennis courts — locate and photograph for Experiences section",
        "Can we have craft services on-site?",
      ]},
      { id:"s4", icon:"🌤️", title:"JW Marriott Desert Ridge — Outdoor & Logistics", items:[
        "All outdoor spaces — map and walkthrough",
        "Can we have misters/fans in outdoor areas?",
        "Can we have marquees/shade structures?",
        "Networking options outside main meeting spaces/lawn",
        "Parking lot — note layout/access for Experiences section (pit crew challenge)",
        "Transport — does the hotel have a shuttle/car service?",
        "Parking — total spaces available, charges for event guests?",
      ]},
      { id:"s5", icon:"🏎️", title:"Experiences", subsections:[
        { id:"ss_golf", label:"⛳ Golf", items:[
          "Talk to golf course team about on-property golf outing experience",
          "Tournament format — what works best and for how many people?",
          "Realistic group size for a golf tournament",
          "Costs — per person, hire fees, packages",
          "F&B networking after the round — options and spaces",
          "F&B during the tournament — can we have drink caddies on course?",
          "Branding & customisation options (signage, flags, carts)",
          "Branded golf swag — caps, balls, etc. available from them?",
          "Where would transport drop off/pick up participants?",
        ]},
        { id:"ss_pickle", label:"🏓 Pickleball / Tennis", items:[
          "Confirm court availability for a group experience",
          "How many courts available and max player capacity?",
          "Can it be run as a tournament/competitive format?",
          "Equipment provided or do we need to source?",
          "F&B options nearby for post-activity networking?",
        ]},
        { id:"ss_pit", label:"🏎️ Pit Crew Challenge", items:[
          "Parking lot: suitability for the challenge setup",
          "Space required — is there enough room?",
          "Access for equipment/truck delivery",
          "Any restrictions from the hotel on this use?",
        ]},
      ]},
      { id:"s6", icon:"🗺️", title:"General Area — Scottsdale", items:[
        "Which airport? (PHX Sky Harbor or Scottsdale Airport)",
        "Approx travel time from airport to hotel",
        "What is nearby the hotel?",
        "Any notable offsite options worth considering?",
      ]},
    ]
  },
  sanjose: {
    label: "💻 San Jose, CA", color: "#1d4ed8", key: "sanjose",
    sections: [
      { id:"j1", icon:"🏨", title:"Signia by Hilton — Event Spaces", items:[
        "Ballrooms — full walkthrough",
        "Breakout spaces — capacity, layout options",
        "Lawn/outdoor event space — if any",
        "Foyer space & registration desks",
        "Ask: how is the foyer separated from the ballroom?",
        "Can a car be driven inside the meeting spaces? (Trackhouse car)",
        "Where could expo booths be set up?",
        "Where could an executive lounge be located?",
        "Full walkthrough of the guest journey to/from meeting spaces",
        "Where is the greenroom behind the stage?",
        "Where is the office space?",
      ]},
      { id:"j2", icon:"🛏️", title:"Signia by Hilton — Sleeping Rooms", items:[
        "ROH (Run of House) rooms — view, standard, quality",
        "Suites — types available, locations, views",
        "Villas — layout, access, suitability for VIPs",
      ]},
      { id:"j3", icon:"🍽️", title:"Signia by Hilton — Public Spaces & Amenities", items:[
        "Restaurants — options, private dining potential",
        "Spa — capacity, group bookings possible?",
        "Pool area — can it be used for events/networking?",
        "Can we have craft services on-site?",
      ]},
      { id:"j4", icon:"🌤️", title:"Signia by Hilton — Outdoor & Logistics", items:[
        "Is there any outdoor space? Walkthrough if so",
        "Networking options — where could these happen?",
        "Transport — does the hotel have a shuttle/car service?",
        "Parking — total spaces available, charges for event guests?",
      ]},
      { id:"j5", icon:"🏎️", title:"Experiences — San Jose", items:[
        "Pit crew challenge — nearby streets or parking lots?",
        "What other experience options are available in the area?",
        "Any unique San Jose/Silicon Valley themed experiences?",
      ]},
      { id:"j6", icon:"🗺️", title:"General Area — San Jose", items:[
        "Which airport? (SJC or SFO — travel time difference)",
        "Approx travel time from airport to hotel",
        "What is nearby the hotel?",
        "Any good offsite options for dinners, experiences, or activities?",
      ]},
    ]
  }
};

let activeCity = "scottsdale";
let filterDone = false;
let state = JSON.parse(localStorage.getItem("sitevisit_state") || "{}");

function save() { localStorage.setItem("sitevisit_state", JSON.stringify(state)); }

function switchCity(city) {
  activeCity = city;
  document.getElementById("tab-scottsdale").className = "tab" + (city === "scottsdale" ? " active-scottsdale" : "");
  document.getElementById("tab-sanjose").className = "tab" + (city === "sanjose" ? " active-sanjose" : "");
  filterDone = false;
  function exportPDF() {
  let html = `<html><head><style>
    body { font-family: system-ui, sans-serif; padding: 32px; max-width: 800px; margin: 0 auto; color: #111; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .date { font-size: 13px; color: #666; margin-bottom: 24px; }
    h2 { font-size: 17px; color: #fff; padding: 8px 12px; border-radius: 6px; margin: 24px 0 8px; }
    h2.scottsdale { background: #c2410c; }
    h2.sanjose { background: #1d4ed8; }
    h3 { font-size: 14px; font-weight: 700; margin: 16px 0 6px; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; }
    .item { font-size: 13px; margin: 4px 0 4px 8px; }
    .done { color: #059669; }
    .note { font-size: 12px; color: #6b7280; font-style: italic; margin: 2px 0 6px 24px; }
    .no-items { font-size: 13px; color: #9ca3af; font-style: italic; margin-left: 8px; }
  </style></head><body>
  <h1>🏁 Conference Site Visit Notes</h1>
  <div class="date">Exported: ${new Date().toLocaleString()}</div>`;

  ["scottsdale","sanjose"].forEach(ck => {
    const city = data[ck];
    const label = ck === "scottsdale" ? "🌵 Scottsdale, AZ" : "💻 San Jose, CA";
    html += `<h2 class="${ck}">${label}</h2>`;
    city.sections.forEach(sec => {
      let secOut = "";
      const processItems = (items, id) => {
        items.forEach((item, i) => {
          const dk = "done_"+ck+"_"+id+"_"+i;
          const nk = ck+"_"+id+"_"+i;
          const isDone = state[dk];
          const note = state["note_"+nk];
          if (isDone || note) {
            secOut += `<div class="item ${isDone?'done':''}">${isDone?"✓":"–"} ${item}</div>`;
            if (note) secOut += `<div class="note">📝 ${note}</div>`;
          }
        });
      };
      if (sec.subsections) {
        sec.subsections.forEach(ss => processItems(ss.items, ss.id));
      } else {
        processItems(sec.items, sec.id);
      }
      if (secOut) html += `<h3>${sec.icon} ${sec.title}</h3>${secOut}`;
    });
  });

  html += `</body></html>`;
  const win = window.open("", "_blank");
  win.document.write(html);
  win.document.close();
  win.print();
}

function exportNotes() {
  let out = "CONFERENCE SITE VISIT NOTES\n";
  out += "Exported: " + new Date().toLocaleString() + "\n";
  out += "=".repeat(40) + "\n\n";

  ["scottsdale","sanjose"].forEach(ck => {
    const city = data[ck];
    out += city.label.toUpperCase() + "\n" + "=".repeat(40) + "\n\n";
    city.sections.forEach(sec => {
      let secOut = "";
      const processItems = (items, id) => {
        items.forEach((item, i) => {
          const dk = "done_"+ck+"_"+id+"_"+i;
          const nk = ck+"_"+id+"_"+i;
          const isDone = state[dk];
          const note = state["note_"+nk];
          if (isDone || note) {
            secOut += (isDone ? "  ✓ " : "  - ") + item + "\n";
            if (note) secOut += "    📝 " + note + "\n";
          }
        });
      };
      if (sec.subsections) {
        sec.subsections.forEach(ss => processItems(ss.items, ss.id));
      } else {
        processItems(sec.items, sec.id);
      }
      if (secOut) out += sec.icon + " " + sec.title + "\n" + secOut + "\n";
    });
  });

  const box = document.getElementById("export-box");
  const btn = document.getElementById("copy-btn");
  box.value = out;
  box.style.display = "block";
  btn.style.display = "block";
  box.scrollIntoView({ behavior: "smooth" });
}

function copyExport() {
  const box = document.getElementById("export-box");
  box.select();
  navigator.clipboard.writeText(box.value).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✅ Copied!";
    setTimeout(() => btn.textContent = "📱 Copy to Clipboard", 2000);
  });
}

render();
}

function toggleFilter() {
  filterDone = !filterDone;
  render();
}

function toggleSection(id) {
  state["collapsed_" + id] = !state["collapsed_" + id];
  save(); render();
}

function toggleItem(key) {
  state[key] = !state[key];
  save(); render();
}

function openNote(key) {
  state["open_" + key] = !state["open_" + key];
  render();
}

function updateNote(key, val) {
  state["note_" + key] = val;
  save();
  // update preview without full re-render
  const el = document.getElementById("notepreview_" + key);
  if (el) el.textContent = val ? "📝 " + (val.length > 60 ? val.slice(0,60)+"…" : val) : "";
}

function countSec(sec, city) {
  if (sec.subsections) return sec.subsections.reduce((a,ss) => a + ss.items.length, 0);
  return sec.items.length;
}
function doneSec(sec, city) {
  if (sec.subsections) return sec.subsections.reduce((a,ss) =>
    a + ss.items.filter((_,i) => state["done_"+city+"_"+ss.id+"_"+i]).length, 0);
  return sec.items.filter((_,i) => state["done_"+city+"_"+sec.id+"_"+i]).length;
}

function render() {
  const city = data[activeCity];
  const ck = activeCity;

  // Progress
  const total = city.sections.reduce((a,s) => a + countSec(s,ck), 0);
  const done = city.sections.reduce((a,s) => a + doneSec(s,ck), 0);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("progress-box").className = "progress-box " + ck;
  document.getElementById("progress-label").className = "progress-label " + ck;
  document.getElementById("progress-label").textContent = "Progress";
  document.getElementById("progress-count").textContent = done + " / " + total + " items";
  document.getElementById("progress-fill").className = "progress-fill " + ck;
  document.getElementById("progress-fill").style.width = pct + "%";

  // Filter btn
  const fb = document.getElementById("filter-btn");
  fb.className = "filter-btn" + (filterDone ? " active-" + ck : "");
  fb.textContent = filterDone ? "✓ Hiding done" : "Show all";

  // Sections
  const container = document.getElementById("sections-container");
  container.innerHTML = "";

  city.sections.forEach(sec => {
    const isCollapsed = state["collapsed_" + sec.id];
    const secDone = doneSec(sec, ck);
    const secTotal = countSec(sec, ck);

    const secEl = document.createElement("div");
    secEl.className = "section " + ck;

    // Header
    secEl.innerHTML = `
      <button class="sec-header ${ck}" onclick="toggleSection('${sec.id}')">
        <div class="sec-header-left">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title ${ck}">${sec.title}</span>
        </div>
        <div class="sec-header-right">
          <span class="sec-count">${secDone}/${secTotal}</span>
          <span class="sec-arrow ${ck}">${isCollapsed ? "▸" : "▾"}</span>
        </div>
      </button>`;

    if (!isCollapsed) {
      const body = document.createElement("div");
      body.className = "sec-body";

      const renderItem = (item, id, idx) => {
        const dk = "done_" + ck + "_" + id + "_" + idx;
        const nk = ck + "_" + id + "_" + idx;
        const isDone = state[dk];
        const noteVal = state["note_" + nk] || "";
        const isOpen = state["open_" + nk];
        if (filterDone && isDone) return "";
        return `
          <div class="item">
            <div class="item-row">
              <button class="checkbox ${isDone ? "done-"+ck : ""}" onclick="toggleItem('${dk}')">${isDone ? "✓" : ""}</button>
              <div style="flex:1">
                <span class="item-text ${isDone ? "done" : ""}">${item}</span>
                <div id="notepreview_${nk}" class="note-preview">${noteVal && !isOpen ? "📝 " + (noteVal.length>60?noteVal.slice(0,60)+"…":noteVal) : ""}</div>
                ${isOpen ? `<textarea oninput="updateNote('${nk}', this.value)" placeholder="Add your notes here...">${noteVal}</textarea>` : ""}
              </div>
              <button class="note-btn ${noteVal ? "has-note-"+ck : ""}" onclick="openNote('${nk}')">${isOpen ? "💾" : "📝"}</button>
            </div>
          </div>`;
      };

      if (sec.subsections) {
        sec.subsections.forEach(ss => {
          const anyVisible = ss.items.some((_,i) => !filterDone || !state["done_"+ck+"_"+ss.id+"_"+i]);
          if (!anyVisible) return;
          body.innerHTML += `<div class="subsec-header ${ck}">${ss.label}</div>`;
          ss.items.forEach((item, i) => { body.innerHTML += renderItem(item, ss.id, i); });
        });
      } else {
        sec.items.forEach((item, i) => { body.innerHTML += renderItem(item, sec.id, i); });
      }

      secEl.appendChild(body);
    }

    container.appendChild(secEl);
  });
}

render();
</script>
</body>
</html>
